# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.demo.learnui5
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: Training
          url: http://49.206.197.10:8034
          client: '100'
        app:
          name: ZLEARN_UI5
          description: Employee Management App
          package: $TMP
          transport: ''
        exclude:
          - /test/
